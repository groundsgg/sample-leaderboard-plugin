apiVersion: grounds.gg/v1
name: sample-leaderboard-plugin
# A real game: forge renders type:gamemode as an Agones Fleet (not a plain
# Deployment), so the Velocity proxy discovers it as a routable backend via
# plugin-platform-router. baseImage paper-gamemode bakes plugin-agones-paper
# (the SDK that drives GameServer Ready/Allocated).
type: gamemode
baseImage: paper-gamemode
agones:
  replicas: 1

# Declared Domain-Services this plugin calls via the Grounds SDK.
# Forge injects `LEADERBOARD_SERVICE_URL` into the pod's env; the SDK
# reads it via `GroundsServices.channel("leaderboard")`. The proto pin
# (`use:`) is documentation today; future versions will enforce a
# registry match.
#
# v2.2 Service Architecture: https://grounds.atlassian.net/wiki/spaces/GK/pages/216662019
services:
  leaderboard:
    use: groundsgg.leaderboard.v1.LeaderboardService

# Typed NATS event subscriptions. Forge injects `NATS_URL` when this
# block is non-empty. The plugin subscribes via GroundsEvents.connect()
# and dispatches typed proto callbacks. Subject wildcards (>, *) are
# allowed; server-side NATS account-permissions will enforce the
# subject whitelist once provisioned.
events:
  - subject: match.lifecycle.ended.>
    schema: gg.grounds.events.match.MatchEnded
